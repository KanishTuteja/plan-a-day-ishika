<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Wine Lab — Fishika</title>
<style>
  :root {
    --bg: #0a0e14;
    --card: #11151c;
    --card-hover: #161c25;
    --accent: #f0a830;
    --line: #2a313c;
    --mono: 'SFMono-Regular', 'Consolas', 'Liberation Mono', 'Menlo', monospace;
  }
  * { box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: #f3f4f6;
    font-family: var(--mono);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 70px;
    min-height: 100vh;
  }

  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .stars::before {
    content: ""; position: absolute; inset: 0; background-repeat: repeat;
    background-image:
      radial-gradient(1px 1px at 20px 30px, #ffffff, transparent),
      radial-gradient(1px 1px at 130px 80px, #cbd5e1, transparent),
      radial-gradient(1px 1px at 260px 160px, #ffffff, transparent),
      radial-gradient(1px 1px at 340px 60px, #ffffff, transparent),
      radial-gradient(1px 1px at 420px 220px, #cbd5e1, transparent);
    background-size: 600px 300px; opacity: 0.4;
  }

  .wrap { position: relative; z-index: 1; width: 100%; max-width: 760px; text-align: center; }

  h1 { margin: 0; font-weight: 400; font-size: 32px; letter-spacing: 0.06em; }
  .lead { color: #9aa3b2; margin: 12px 0 0; font-size: 14px; }

  .bench {
    margin-top: 40px;
    display: grid;
    grid-template-columns: 1fr 180px 1fr;
    gap: 20px;
    align-items: start;
  }

  .col-title {
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: #6b7280; margin-bottom: 12px;
  }

  .chip {
    display: flex; align-items: center; gap: 10px;
    width: 100%; text-align: left;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 12px; margin-bottom: 9px;
    color: #d8dee9; font-family: var(--mono); font-size: 13px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .chip:hover { background: var(--card-hover); border-color: #3a4250; }
  .chip.on { border-color: var(--accent); background: #181410; color: #f3f4f6; }
  .chip .dot { width: 13px; height: 13px; border-radius: 50%; flex: 0 0 auto; border: 1px solid rgba(255,255,255,0.15); }
  .chip svg { width: 20px; height: 20px; flex: 0 0 auto; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; color: #9aa3b2; }
  .chip.on svg { color: var(--accent); }

  /* flask in the middle */
  .flaskwrap { display: flex; flex-direction: column; align-items: center; position: relative; }

  .drop {
    position: absolute; top: 0; left: 50%; margin-left: -13px;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    opacity: 0; pointer-events: none; z-index: 3;
  }
  .drop svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
  .drop.falling { animation: drop 0.75s cubic-bezier(.5,0,.9,.6) forwards; }
  @keyframes drop {
    0%   { opacity: 0; top: -4px;  transform: scale(0.9); }
    25%  { opacity: 1; }
    80%  { opacity: 1; top: 92px;  transform: scale(0.55); }
    100% { opacity: 0; top: 104px; transform: scale(0.25); }
  }
  .flask { width: 150px; height: 180px; }
  .flask .liquid { transition: y 0.6s ease, height 0.6s ease, fill 0.6s ease; }
  .flask .glass { fill: rgba(255,255,255,0.025); stroke: #5a6473; stroke-width: 2; stroke-linejoin: round; }
  .flask .rim { stroke: #5a6473; stroke-width: 3.5; stroke-linecap: round; }
  .bubble { fill: rgba(255,255,255,0.5); opacity: 0; }
  .reacting .bubble { animation: rise 1.1s ease-in infinite; }
  .reacting .b1 { animation-delay: 0s; }
  .reacting .b2 { animation-delay: 0.25s; }
  .reacting .b3 { animation-delay: 0.5s; }
  .reacting .b4 { animation-delay: 0.75s; }
  @keyframes rise {
    0% { opacity: 0; transform: translateY(0) scale(0.6); }
    25% { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(-46px) scale(1); }
  }

  .react-btn {
    margin-top: 14px; padding: 11px 22px;
    border: 1px solid var(--accent); border-radius: 999px;
    color: var(--accent); background: none; font-family: var(--mono);
    font-size: 14px; letter-spacing: 0.06em; cursor: pointer;
    opacity: 0.35; pointer-events: none;
    transition: background 0.2s ease, color 0.2s ease, opacity 0.2s ease;
  }
  .react-btn.ready { opacity: 1; pointer-events: auto; }
  .react-btn.ready:hover { background: var(--accent); color: #0a0e14; }

  /* result */
  .result {
    margin: 36px auto 0; max-width: 560px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 22px 24px;
    text-align: left; display: none;
  }
  .result.show { display: block; }
  .result .compound { font-size: 19px; color: var(--accent); }
  .result .eq {
    margin: 12px 0; padding: 10px 12px;
    background: #0c1118; border: 1px solid var(--line); border-radius: 8px;
    font-size: 13px; color: #c3cad6; overflow-x: auto; white-space: nowrap;
  }
  .result .verdict { font-size: 14px; color: #d8dee9; line-height: 1.6; }
  .result .stars { margin-top: 12px; font-size: 15px; color: var(--accent); letter-spacing: 2px; }
  .result .stars .label { color: #6b7280; font-size: 11px; letter-spacing: 0.08em; margin-left: 8px; text-transform: uppercase; }

  .cheers {
    display: none; margin-top: 18px; padding: 11px 26px;
    border: 1px solid var(--accent); border-radius: 999px;
    background: var(--accent); color: #0a0e14; font-family: var(--mono);
    font-size: 14px; letter-spacing: 0.06em; cursor: pointer;
  }
  .result.show .cheers { display: inline-block; }

  .finale {
    display: none; margin-top: 30px;
    font-size: 17px; color: var(--accent); line-height: 1.6;
  }
  .finale.show { display: block; }

  .back {
    display: block; margin-top: 34px; color: #7d8696; text-decoration: none;
    font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
  }
  .back:hover { color: var(--accent); }

  @media (max-width: 640px) {
    .bench { grid-template-columns: 1fr; }
    .flaskwrap { order: -1; margin-bottom: 8px; }
  }
</style>
</head>
<body>
  <div class="stars"></div>

  <div class="wrap">
    <h1>⚗ THE WINE LAB</h1>
    <p class="lead">Those cursed combos we never shut up about — finally, legally, together. Pick a base + a reagent and run the reaction. 🧪</p>

    <div class="bench">

      <!-- WINE BASE -->
      <div class="col">
        <div class="col-title">① Wine Base</div>
        <div id="wines"></div>
      </div>

      <!-- FLASK -->
      <div class="flaskwrap">
        <div class="drop" id="drop"></div>
        <svg class="flask" id="flask" viewBox="0 0 100 120">
          <defs>
            <clipPath id="flaskClip">
              <path d="M40 10 H60 V42 L85 100 a7 7 0 0 1 -6 11 H21 a7 7 0 0 1 -6 -11 L40 42 Z"/>
            </clipPath>
          </defs>
          <g clip-path="url(#flaskClip)">
            <rect class="liquid" id="liquid" x="0" y="120" width="100" height="0" fill="#7a1f2b"/>
            <circle class="bubble b1" cx="40" cy="100" r="2.5"/>
            <circle class="bubble b2" cx="55" cy="104" r="2"/>
            <circle class="bubble b3" cx="48" cy="98" r="3"/>
            <circle class="bubble b4" cx="60" cy="102" r="1.8"/>
          </g>
          <path class="glass" d="M40 10 H60 V42 L85 100 a7 7 0 0 1 -6 11 H21 a7 7 0 0 1 -6 -11 L40 42 Z"/>
          <line class="rim" x1="36" y1="10" x2="64" y2="10"/>
        </svg>
        <button class="react-btn" id="react">⚗ React</button>
      </div>

      <!-- REAGENT -->
      <div class="col">
        <div class="col-title">② Reagent</div>
        <div id="mixers"></div>
      </div>

    </div>

    <div class="result" id="result">
      <div class="compound" id="compound">—</div>
      <div class="eq" id="equation">—</div>
      <div class="verdict" id="verdict">—</div>
      <div class="stars" id="stars">—</div>
      <button class="cheers" id="cheers">🥂 This is the one — cheers!</button>
    </div>

    <div class="finale" id="finale"></div>

    <a class="back" href="plan.html">◂ back to the plan</a>
  </div>

  <script>
    const WINES = [
      { id: 'red',  name: 'Red (Merlot)',     color: '#7a1f2b' },
      { id: 'white',name: 'White (Pinot G.)',  color: '#d9cf8f' },
      { id: 'rose', name: 'Rosé',              color: '#e29aa6' },
      { id: 'fizz', name: 'Sparkling (Prosecco)', color: '#e8dca0' }
    ];

    const MIXERS = {
      vanilla: {
        label: 'Vanilla Ice Cream',
        icon: '<svg viewBox="0 0 24 24"><path d="M8 9.5a4 4 0 0 1 8 0"/><path d="M7.3 10.2h9.4L12 20.5z"/></svg>',
        compound: 'Affogato Rebellis',
        eq: 'EtOH(aq) + Cream(s) → Bliss(l) + Regret(g)↑',
        verdict: "Affogato's rebellious cousin. Creamy, boozy, suspiciously elite.",
        stars: 4, mix: '#f3e9c8'
      },
      sprite: {
        label: 'Sprite',
        icon: '<svg viewBox="0 0 24 24"><rect x="7" y="3" width="10" height="18" rx="2"/><path d="M9 7h6M9 11h6"/></svg>',
        compound: 'Spritz Tinto',
        eq: 'Wine(aq) + CO₂(g) → Spritzer(l) + Fizz(g)↑',
        verdict: 'The gateway spritzer. Refreshing, mildly unhinged, dangerously drinkable.',
        stars: 4, mix: '#cfe8a0'
      },
      chocolate: {
        label: 'Chocolate',
        icon: '<svg viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="1.5"/><path d="M5 12h14M12 5v14"/></svg>',
        compound: 'Cacao Vinum',
        eq: 'Wine(l) + Cacao(s) → PowerCouple(l) + Serotonin(g)↑',
        verdict: 'Dessert and wine finally stopped fighting. The classic power couple.',
        stars: 5, mix: '#4a2c1a'
      },
      chococream: {
        label: 'Choc Ice Cream',
        icon: '<svg viewBox="0 0 24 24"><path d="M7 11a5 5 0 0 1 10 0z"/><path d="M7.5 11.5h9L13.5 21h-3z"/><path d="M9.5 15h5"/></svg>',
        compound: 'Dessertium Maximus',
        eq: 'Wine(aq) + ChocCream(s) → Dessert²(l) + Sugar(g)↑',
        verdict: 'Liquid dessert singularity. Dentists weep. We, however, do not care.',
        stars: 3, mix: '#5b3a2a'
      },
      oj: {
        label: 'Orange Juice',
        icon: '<svg viewBox="0 0 24 24"><path d="M7 8h10l-1 11a2 2 0 0 1-2 1.8H10A2 2 0 0 1 8 19z"/><path d="M9 8c0-2 1.5-3 3-3s3 1 3 3"/></svg>',
        compound: 'Mimosa Plus',
        eq: 'Wine(aq) + OJ(aq) → Brunch(l) + Vitamins(g)↑',
        verdict: "Brunch in a beaker. Mimosa's wilder, funnier sibling.",
        stars: 4, mix: '#e6a93c'
      },
      ice: {
        label: 'Ice Cubes',
        icon: '<svg viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="2"/><path d="M5 10l5-5M14 19l5-5"/></svg>',
        compound: 'Glacier Heresy',
        eq: 'Wine(l) + H₂O(s) → ColdWine(l) + SommelierTears(g)↑',
        verdict: 'Bold move, icing the wine. Sommeliers fainting in the corner. Still valid.',
        stars: 2, mix: '#bcd6e8'
      }
    };

    let selWine = null, selMixer = null;

    const winesEl = document.getElementById('wines');
    const mixersEl = document.getElementById('mixers');
    const liquid = document.getElementById('liquid');
    const flask = document.getElementById('flask');
    const reactBtn = document.getElementById('react');
    const resultEl = document.getElementById('result');

    WINES.forEach(w => {
      const b = document.createElement('button');
      b.className = 'chip';
      b.innerHTML = '<span class="dot" style="background:' + w.color + '"></span>' + w.name;
      b.addEventListener('click', () => {
        winesEl.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
        b.classList.add('on');
        selWine = w;
        fillFlask(w.color, 62);
        refresh();
      });
      winesEl.appendChild(b);
    });

    Object.entries(MIXERS).forEach(([id, m]) => {
      const b = document.createElement('button');
      b.className = 'chip';
      b.innerHTML = m.icon + '<span>' + m.label + '</span>';
      b.addEventListener('click', () => {
        mixersEl.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
        b.classList.add('on');
        selMixer = id;
        refresh();
      });
      mixersEl.appendChild(b);
    });

    function fillFlask(color, pct) {
      const h = pct;             // viewBox is 120 tall
      liquid.setAttribute('fill', color);
      liquid.setAttribute('height', h);
      liquid.setAttribute('y', 120 - h);
    }

    function blend(a, b, t) {
      const pa = [parseInt(a.slice(1,3),16), parseInt(a.slice(3,5),16), parseInt(a.slice(5,7),16)];
      const pb = [parseInt(b.slice(1,3),16), parseInt(b.slice(3,5),16), parseInt(b.slice(5,7),16)];
      const m = pa.map((v,i) => Math.round(v + (pb[i]-v)*t));
      return '#' + m.map(v => v.toString(16).padStart(2,'0')).join('');
    }

    function refresh() {
      if (selWine && selMixer) reactBtn.classList.add('ready');
    }

    const drop = document.getElementById('drop');

    reactBtn.addEventListener('click', () => {
      if (!selWine || !selMixer) return;
      const m = MIXERS[selMixer];

      // 1) drop the reagent in
      drop.style.color = m.mix;
      drop.innerHTML = m.icon;
      drop.classList.remove('falling');
      void drop.offsetWidth;          // restart animation
      drop.classList.add('falling');

      // 2) once it lands, blend the liquid + bubble
      setTimeout(() => {
        flask.classList.add('reacting');
        fillFlask(blend(selWine.color, m.mix, 0.4), 80);
      }, 520);
      setTimeout(() => flask.classList.remove('reacting'), 2100);

      document.getElementById('compound').textContent = '🧪 ' + m.compound;
      document.getElementById('equation').textContent =
        selWine.name.split(' ')[0] + '·' + m.eq;
      document.getElementById('verdict').textContent =
        'Your ' + selWine.name + ' + ' + m.label + ': ' + m.verdict;
      const filled = '★'.repeat(m.stars) + '☆'.repeat(5 - m.stars);
      document.getElementById('stars').innerHTML =
        filled + '<span class="label">stability</span>';

      resultEl.classList.add('show');
      sessionStorage.setItem('chosenCombo', selWine.name + ' + ' + m.label);
    });

    document.getElementById('cheers').addEventListener('click', () => {
      window.location.href = 'final.html';
    });
  </script>
</body>
</html>
