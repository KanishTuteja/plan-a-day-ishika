<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pick a Walk — Fishika</title>
  <style>
    :root {
      --bg: #0a0e14;
      --card: #11151c;
      --card-hover: #161c25;
      --accent: #f0a830;
      --line: #2a313c;
      --mono: 'SFMono-Regular', 'Consolas', 'Liberation Mono', 'Menlo', monospace;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: #f3f4f6;
      font-family: var(--mono);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 20px 70px;
      min-height: 100vh;
    }

    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .stars::before {
      content: "";
      position: absolute; inset: 0; background-repeat: repeat;
      background-image:
        radial-gradient(1px 1px at 20px 30px, #ffffff, transparent),
        radial-gradient(1px 1px at 130px 80px, #cbd5e1, transparent),
        radial-gradient(1px 1px at 260px 160px, #ffffff, transparent),
        radial-gradient(1px 1px at 340px 60px, #ffffff, transparent),
        radial-gradient(1px 1px at 420px 220px, #cbd5e1, transparent);
      background-size: 600px 300px; opacity: 0.4;
    }

    .wrap { position: relative; z-index: 1; width: 100%; max-width: 720px; }
    .head { text-align: center; }
    .datechip {
      display: inline-block;
      margin-bottom: 14px;
      padding: 5px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--accent);
    }
    h1 { margin: 0; font-weight: 400; font-size: 30px; letter-spacing: 0.04em; }
    .lead { color: #9aa3b2; margin: 12px 0 0; font-size: 14px; }

    .list { margin-top: 36px; display: flex; flex-direction: column; gap: 14px; }

    .walk {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px 18px;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    }
    .walk:hover { background: var(--card-hover); border-color: #3a4250; transform: translateY(-2px); }
    .walk.selected { border-color: var(--accent); background: #181410; }

    .emoji {
      flex: 0 0 auto;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      background: #0c1118;
      border: 1px solid var(--line);
      border-radius: 12px;
    }
    .info { flex: 1 1 auto; min-width: 0; text-align: left; }
    .title { font-size: 16px; color: #f3f4f6; }
    .blurb { margin: 4px 0 0; font-size: 13px; color: #c3cad6; }
    .loc { margin: 2px 0 0; font-size: 12px; color: #6b7280; }

    .cta {
      display: inline-block;
      margin-top: 30px;
      padding: 13px 32px;
      border: 1px solid var(--accent);
      border-radius: 999px;
      color: var(--accent);
      background: none;
      font-family: var(--mono);
      font-size: 15px;
      letter-spacing: 0.08em;
      cursor: pointer;
      opacity: 0.35;
      pointer-events: none;
      transition: background 0.25s ease, color 0.25s ease, opacity 0.25s ease;
    }
    .cta.ready { opacity: 1; pointer-events: auto; }
    .cta.ready:hover { background: var(--accent); color: #0a0e14; }

    .back {
      display: block; text-align: center; margin-top: 22px;
      color: #7d8696; text-decoration: none;
      font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    }
    .back:hover { color: var(--accent); }

    @media (max-width: 520px) {
      .walk { flex-wrap: wrap; }
      .meta { padding-left: 64px; }
    }
  </style>
</head>
<body>
  <div class="stars"></div>

  <div class="wrap">
    <div class="head">
      <span class="datechip" id="datechip">—</span>
      <h1>Pick a walk</h1>
      <p class="lead">Neighbourhood strolls, not sightseeing cardio. Tap one. 🚶‍♂️</p>
    </div>

    <div class="list" id="list"></div>
    <button class="cta" id="confirm">Map this walk ▸</button>
    <a class="back" href="plan.html">◂ back to plan</a>
  </div>

  <script>
    const WALKS = [
      {
        emoji: '🌿',
        title: 'Kensington stroll',
        blurb: 'Market lanes, hidden murals, and one very intense empanada.',
        loc: 'Kensington Market',
        maps: 'Kensington Market Toronto walking'
      },
      {
        emoji: '🌊',
        title: 'Harbourfront loop',
        blurb: 'Lake breeze, ferries, and pretending we live on a yacht.',
        loc: 'Harbourfront Centre',
        maps: 'Harbourfront Centre Toronto walking'
      },
      {
        emoji: '🏛️',
        title: 'Distillery meander',
        blurb: 'Cobblestones, chocolate smells, no one checks our pace.',
        loc: 'Distillery Historic District',
        maps: 'Distillery Historic District Toronto walking'
      },
      {
        emoji: '🍁',
        title: 'High Park saunter',
        blurb: 'Trees, trails, and optional dramatic bench sitting.',
        loc: 'High Park',
        maps: 'High Park Toronto walking'
      },
      {
        emoji: '🛍️',
        title: 'Yorkville wander',
        blurb: 'Window shopping, coffee standoffs, and pretending we belong.',
        loc: 'Yorkville Avenue',
        maps: 'Yorkville Avenue Toronto walking'
      }
    ];

    const listEl = document.getElementById('list');
    const confirmEl = document.getElementById('confirm');
    const dateChip = document.getElementById('datechip');
    let selected = null;

    dateChip.textContent = sessionStorage.getItem('chosenDate') || 'Your day';

    WALKS.forEach((w) => {
      const card = document.createElement('div');
      card.className = 'walk';
      card.innerHTML =
        '<div class="emoji">' + w.emoji + '</div>' +
        '<div class="info">' +
          '<div class="title">' + w.title + '</div>' +
          '<p class="blurb">' + w.blurb + '</p>' +
          '<p class="loc">📍 ' + w.loc + '</p>' +
        '</div>';

      card.addEventListener('click', () => {
        document.querySelectorAll('.walk.selected').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selected = w;
        confirmEl.classList.add('ready');
        confirmEl.textContent = 'Map this walk ▸';
      });

      listEl.appendChild(card);
    });

    confirmEl.addEventListener('click', () => {
      if (!selected) return;
      sessionStorage.setItem('chosenWalk', selected.title);
      sessionStorage.setItem('chosenWalkMaps', selected.maps);
      window.location.href = 'route.html';
    });
  </script>
</body>
</html>
