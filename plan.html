<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Our Day — Fishika</title>
<style>
  :root {
    --bg: #0a0e14;
    --accent: #f0a830;
    --mono: 'SFMono-Regular', 'Consolas', 'Liberation Mono', 'Menlo', monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: #f3f4f6;
    font-family: var(--mono);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  h1 { margin: 0; font-weight: 400; font-size: 40px; letter-spacing: 0.05em; }
  .date { margin: 18px 0 0; font-size: 20px; color: var(--accent); }
  .itin { margin: 26px auto 0; max-width: 440px; text-align: left; display: flex; flex-direction: column; gap: 12px; }
  .step { display: flex; gap: 12px; align-items: baseline; font-size: 15px; color: #c3cad6; }
  .step .n { color: var(--accent); font-size: 12px; min-width: 58px; letter-spacing: 0.06em; }
  .sub { margin: 26px 0 0; color: #9aa3b2; }
  .cta {
    display: inline-block; margin-top: 24px; padding: 13px 30px;
    border: 1px solid var(--accent); border-radius: 999px;
    color: var(--accent); text-decoration: none;
    font-size: 15px; letter-spacing: 0.06em;
    transition: background 0.25s ease, color 0.25s ease;
  }
  .cta:hover { background: var(--accent); color: #0a0e14; }
  .back {
    margin-top: 40px; color: #7d8696; text-decoration: none;
    font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
  }
  .back:hover { color: var(--accent); }
</style>
</head>
<body>
  <h1>LOCKED IN ✓</h1>
  <p class="date" id="chosen">—</p>

  <div class="itin">
    <div class="step"><span class="n">01 ·&nbsp;START</span><span id="activity">—</span></div>
    <div class="step"><span class="n">02 ·&nbsp;WALK</span><span id="walk">—</span></div>
    <div class="step"><span class="n">03 ·&nbsp;DINNER</span><span id="dinner">—</span></div>
  </div>

  <p class="sub">It's in writing now. Cancelling costs a flat fee of one (1) sad face. 🥲</p>
  <p class="sub">And for the grand finale… those weird wine combos we never shut up about.</p>
  <a class="cta" href="lab.html">⚗ Enter the Wine Lab ▸</a>
  <br />
  <a class="back" href="dinner.html">◂ change the dinner</a>

  <script>
    document.getElementById('chosen').textContent =
      sessionStorage.getItem('chosenDate') || 'No day selected';
    const act = sessionStorage.getItem('chosenActivity');
    document.getElementById('activity').textContent = act || 'No activity picked';
    const walk = sessionStorage.getItem('chosenWalk');
    document.getElementById('walk').textContent = walk || 'No walk picked';
    const dinner = sessionStorage.getItem('chosenDinner');
    document.getElementById('dinner').textContent = dinner || 'No dinner picked';
  </script>
</body>
</html>
