<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plan a Day with Kanish</title>
<style>
  :root {
    --bg: #0a0e14;
    --accent: #f0a830;
    --mono: 'SFMono-Regular', 'Consolas', 'Liberation Mono', 'Menlo', monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: #f3f4f6;
    font-family: var(--mono);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* starfield background */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .stars::before, .stars::after {
    content: ""; position: absolute; inset: 0; background-repeat: repeat;
  }
  .stars::before {
    background-image:
      radial-gradient(1px 1px at 20px 30px, #ffffff, transparent),
      radial-gradient(1px 1px at 130px 80px, #cbd5e1, transparent),
      radial-gradient(1px 1px at 260px 160px, #ffffff, transparent),
      radial-gradient(1px 1px at 80px 200px, #94a3b8, transparent),
      radial-gradient(1px 1px at 340px 60px, #ffffff, transparent),
      radial-gradient(1px 1px at 420px 220px, #cbd5e1, transparent),
      radial-gradient(1px 1px at 500px 120px, #ffffff, transparent);
    background-size: 600px 300px; opacity: 0.5;
  }
  .stars::after {
    background-image:
      radial-gradient(1px 1px at 150px 50px, #ffffff, transparent),
      radial-gradient(1px 1px at 300px 180px, #94a3b8, transparent),
      radial-gradient(1px 1px at 450px 90px, #ffffff, transparent),
      radial-gradient(1px 1px at 90px 250px, #cbd5e1, transparent);
    background-size: 500px 350px; opacity: 0.35;
  }

  h1 {
    position: relative;
    z-index: 1;
    margin: 0;
    font-weight: 400;
    font-size: 56px;
    letter-spacing: 0.06em;
    text-align: center;
    padding: 0 24px;
  }
  .tagline {
    position: relative;
    z-index: 1;
    margin: 18px auto 0;
    max-width: 520px;
    padding: 0 24px;
    text-align: center;
    font-size: 15px;
    line-height: 1.6;
    color: #9aa3b2;
  }
  .tagline em { color: #c3cad6; font-style: italic; }

  .ask { position: relative; z-index: 1; text-align: center; }
  .q {
    margin: 40px 0 0;
    font-size: 17px;
    letter-spacing: 0.04em;
    color: #c3cad6;
  }

  .choices {
    position: relative;
    margin-top: 22px;
    min-height: 60px;
    display: flex;
    gap: 18px;
    align-items: center;
    justify-content: center;
  }

  .choice {
    position: relative;
    z-index: 2;
    font-family: var(--mono);
    font-size: 16px;
    letter-spacing: 0.06em;
    padding: 13px 36px;
    border-radius: 999px;
    border: 1px solid var(--accent);
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
  }
  .choice.yes { background: var(--accent); color: #0a0e14; }
  .choice.yes:hover { transform: scale(1.06); }

  .choice.no {
    background: none;
    color: var(--accent);
    transition: left 0.28s cubic-bezier(.2,.8,.3,1), top 0.28s cubic-bezier(.2,.8,.3,1),
                background 0.2s ease, color 0.2s ease;
  }

  .hint {
    position: relative;
    z-index: 1;
    margin-top: 26px;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #565d6a;
    min-height: 16px;
    transition: opacity 0.3s ease;
  }

  @media (max-width: 720px) {
    h1 { font-size: 34px; }
  }
</style>
</head>
<body>
  <div class="stars"></div>

  <h1>PLAN A DAY WITH KANISH</h1>
  <p class="tagline">One (1) whole day, pre-planned. No "idk, what do <em>you</em> wanna do?" loops allowed.</p>

  <div class="ask">
    <p class="q">So… are we doing this?</p>
    <div class="choices" id="choices">
      <button class="choice yes" id="yesBtn" type="button">Yes</button>
      <button class="choice no" id="noBtn" type="button">No</button>
    </div>
  </div>

  <p class="hint" id="hint"></p>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn  = document.getElementById('noBtn');
    const hint   = document.getElementById('hint');

    const QUIPS = [
      'nice try',
      'too slow',
      'not an option ;)',
      'the button said no',
      'catch me if you can',
      'wrong one'
    ];
    let dodges = 0;

    function flee(e) {
      if (e) e.preventDefault();
      const bw = noBtn.offsetWidth, bh = noBtn.offsetHeight;
      const m = 14;
      const maxX = Math.max(m, window.innerWidth  - bw - m);
      const maxY = Math.max(m, window.innerHeight - bh - m);
      const x = Math.floor(m + Math.random() * (maxX - m));
      const y = Math.floor(m + Math.random() * (maxY - m));
      noBtn.style.position = 'fixed';
      noBtn.style.margin = '0';
      noBtn.style.left = x + 'px';
      noBtn.style.top  = y + 'px';

      hint.textContent = QUIPS[dodges % QUIPS.length];
      dodges++;
      // "Yes" gets a little more eager every time "No" runs off
      yesBtn.style.transform = 'scale(' + Math.min(1 + dodges * 0.09, 1.85) + ')';
    }

    // Hover (desktop) + the actual tap/press (mobile) both make it run away.
    ['pointerenter', 'pointerdown', 'mousedown', 'touchstart', 'click', 'focus'].forEach(ev =>
      noBtn.addEventListener(ev, flee, { passive: false })
    );

    yesBtn.addEventListener('click', () => { window.location.href = 'day.html'; });
  </script>
</body>
</html>
