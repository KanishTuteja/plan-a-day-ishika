<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Walk Route — Fishika</title>
  <style>
    :root {
      --bg: #0a0e14;
      --accent: #f0a830;
      --mono: 'SFMono-Regular', 'Consolas', 'Liberation Mono', 'Menlo', monospace;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: #f3f4f6;
      font-family: var(--mono);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 20px 60px;
      min-height: 100vh;
    }

    /* starfield */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .stars::before {
      content: "";
      position: absolute; inset: 0; background-repeat: repeat;
      background-image:
        radial-gradient(1px 1px at 20px 30px, #ffffff, transparent),
        radial-gradient(1px 1px at 130px 80px, #cbd5e1, transparent),
        radial-gradient(1px 1px at 260px 160px, #ffffff, transparent),
        radial-gradient(1px 1px at 340px 60px, #ffffff, transparent),
        radial-gradient(1px 1px at 420px 220px, #cbd5e1, transparent);
      background-size: 600px 300px; opacity: 0.4;
    }

    .wrap { position: relative; z-index: 1; width: 100%; max-width: 760px; text-align: center; }
    h1 { margin: 0; font-weight: 400; font-size: 34px; letter-spacing: 0.05em; }
    .lead { color: #9aa3b2; margin: 14px 0 0; font-size: 15px; }

    .route {
      margin-top: 36px;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .stop {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      background: #11151c;
      border: 1px solid #2a313c;
      border-radius: 14px;
      padding: 18px;
    }
    .stop:first-child { border-color: var(--accent); background: #181410; }

    .dot {
      flex: 0 0 auto;
      margin-top: 4px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #151920;
      border: 1px solid #2a313c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    .stop:first-child .dot {
      background: var(--accent);
      color: #0a0e14;
      border-color: var(--accent);
    }

    .stop-body { flex: 1 1 auto; min-width: 0; }
    .stop-title { font-size: 16px; color: #f3f4f6; }
    .stop-meta { margin-top: 6px; font-size: 13px; color: #9aa3b2; }
    .stop-note { margin-top: 8px; font-size: 13px; color: #c3cad6; line-height: 1.5; }

    .cta {
      display: inline-block;
      margin-top: 26px;
      padding: 12px 28px;
      border: 1px solid var(--accent);
      border-radius: 999px;
      color: var(--accent);
      text-decoration: none;
      font-size: 15px;
      letter-spacing: 0.08em;
      transition: background 0.25s ease, color 0.25s ease;
    }
    .cta:hover { background: var(--accent); color: #0a0e14; }
    .back {
      display: inline-block;
      margin-top: 22px;
      color: #7d8696;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    .back:hover { color: var(--accent); }

    @media (max-width: 520px) {
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="wrap">
    <h1>WALKING ROUTE</h1>
    <p class="lead" id="lead">A casual route around your first stop.</p>

    <div class="route">
      <div class="stop">
        <div class="dot">1</div>
        <div class="stop-body">
          <div class="stop-title" id="main-title">—</div>
          <div class="stop-meta" id="main-meta"></div>
          <div class="stop-note">Start here. Walk slow. No rushing a good day.</div>
        </div>
      </div>
      <div class="stop">
        <div class="dot">?</div>
        <div class="stop-body">
          <div class="stop-title">Next stop — your call</div>
          <div class="stop-meta">Keep wandering. Best dates are rarely 0% detours.</div>
        </div>
      </div>
    </div>

    <a class="cta" id="openRoute" href="#" target="_blank" rel="noopener">Open walking route ▸</a>
    <br />
    <a class="back" href="plan.html">◂ back to plan</a>
  </div>

  <script>
    const act = sessionStorage.getItem('chosenActivityMaps') || sessionStorage.getItem('chosenActivity') || '';
    document.getElementById('main-title').textContent = act || 'Your chosen spot';
    document.getElementById('main-meta').textContent = 'Toronto · walking route starting here';
    document.getElementById('openRoute').href =
      'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(act) + '&dirmode=walk';
  </script>
</body>
</html>
